name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Valor fictício apenas para o carregamento do prisma.config.ts e do build;
      # nenhum passo da CI conecta ao banco (testes usam fakes).
      DATABASE_URL: postgresql://ci:ci@localhost:5432/meubolso_ci
      JWT_SECRET: ci-dummy-secret

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace @meubolso/backend

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: meubolso_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/meubolso_ci
      JWT_SECRET: ci-dummy-secret
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare env files
        run: |
          printf 'DATABASE_URL=%s\nJWT_SECRET=%s\nJWT_EXPIRES_IN=1d\nPORT=4000\n' "$DATABASE_URL" "$JWT_SECRET" > apps/backend/.env
          printf 'NEXT_PUBLIC_API_URL=%s\n' "$NEXT_PUBLIC_API_URL" > apps/frontend/.env

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace @meubolso/backend

      - name: Build workspaces
        run: npm run build

      - name: Run database migrations
        run: npm run prisma:migrate:deploy --workspace @meubolso/backend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/e2e

      - name: Run e2e tests
        run: npm run test:e2e
