name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Valor fictício apenas para o carregamento do prisma.config.ts e do build;
      # nenhum passo da CI conecta ao banco (testes usam fakes).
      DATABASE_URL: postgresql://ci:ci@localhost:5432/meubolso_ci
      JWT_SECRET: ci-dummy-secret

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace @meubolso/backend

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
